name: 📚 Documentation Issue
description: Report documentation issues or suggest improvements
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation!

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following
      options:
        - label: I have searched existing documentation issues
          required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: What kind of documentation issue is this?
      options:
        - "Missing documentation"
        - "Incorrect/outdated information"
        - "Confusing/unclear documentation"
        - "Spelling/grammar error"
        - "Broken link"
        - "Code example doesn't work"
        - "Suggestion for improvement"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: location
    attributes:
      label: Documentation Location
      description: Where is the issue located?
      options:
        - "README.md"
        - "AGENTS.md"
        - "CONTRIBUTING.md"
        - "SECURITY.md"
        - "docs/ folder"
        - "Code comments (JSDoc)"
        - "API documentation"
        - "Examples"
        - "Multiple locations"
        - "Other"
    validations:
      required: true

  - type: input
    id: file-path
    attributes:
      label: File Path
      description: Specific file(s) with the issue
      placeholder: "docs/CONFIGURATION.md, src/utils/core/logger.ts"

  - type: textarea
    id: current
    attributes:
      label: Current Documentation
      description: What does the current documentation say?
      placeholder: "The current documentation states..."
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: Issue Description
      description: What is wrong or missing?
      placeholder: "The issue is..."
    validations:
      required: true

  - type: textarea
    id: suggested
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
      placeholder: "The documentation should instead..."
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example
      description: Provide a specific example if applicable
      placeholder: |
        ```markdown
        Suggested documentation text...
        ```
      render: markdown

  - type: dropdown
    id: audience
    attributes:
      label: Target Audience
      description: Who is affected by this documentation issue?
      options:
        - "New users/beginners"
        - "Experienced users"
        - "Contributors"
        - "Everyone"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this documentation fix?
      options:
        - "Critical - Prevents framework usage"
        - "High - Causes significant confusion"
        - "Medium - Minor confusion"
        - "Low - Nice to have"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to help fix this?
      options:
        - label: I am willing to submit a PR to fix this documentation
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information
      placeholder: "Add any other context, screenshots, or links..."
