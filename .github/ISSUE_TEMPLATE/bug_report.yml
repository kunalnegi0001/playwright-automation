name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have read the documentation (README.md, docs/)
          required: true
        - label: I am using the latest version of the framework
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Run command '...'
        2. Execute test '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: test-type
    attributes:
      label: Test Type
      description: Which type of test is affected?
      options:
        - UI Testing
        - API Testing
        - BDD/Cucumber
        - Visual Regression
        - Accessibility Testing
        - Performance Testing
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser (if UI test)
      description: Which browser(s) does this affect?
      multiple: true
      options:
        - Chromium
        - Firefox
        - WebKit
        - All browsers
        - Not applicable

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.18.0"
    validations:
      required: true

  - type: input
    id: playwright-version
    attributes:
      label: Playwright Version
      description: Output of `pnpm list @playwright/test`
      placeholder: "@playwright/test@1.42.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you using?
      options:
        - macOS
        - Linux (Ubuntu)
        - Linux (other)
        - Windows
        - CI/CD Environment
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste relevant error logs, stack traces, or screenshots
      placeholder: Paste error logs here...
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant configuration (playwright.config.ts, .env values - **DO NOT** include secrets)
      placeholder: Paste relevant configuration...
      render: typescript

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help us resolve the issue
      placeholder: Add any other context about the problem...

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - "Critical - Blocks all testing"
        - "High - Blocks specific test suites"
        - "Medium - Workaround exists"
        - "Low - Minor inconvenience"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to help fix this?
      options:
        - label: I am willing to submit a PR to fix this issue
          required: false
