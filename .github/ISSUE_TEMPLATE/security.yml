name: 🔒 Security Vulnerability
description: Report a security vulnerability (privately)
title: "[Security]: "
labels: ["security", "critical"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **SECURITY WARNING**

        If you're reporting a **critical security vulnerability**, please:
        1. DO NOT create a public issue
        2. Instead, email security@yourcompany.com or use GitHub Security Advisories
        3. See [SECURITY.md](../SECURITY.md) for our security policy

        This template is for **low-severity security concerns** only.

  - type: checkboxes
    id: severity-check
    attributes:
      label: Severity Confirmation
      description: Please confirm this is not a critical vulnerability
      options:
        - label: This is a low-severity security concern (not exploitable in production)
          required: true
        - label: I understand that critical vulnerabilities should be reported privately
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Security Category
      description: What type of security concern is this?
      options:
        - "Dependency vulnerability (low risk)"
        - "Code quality/best practice"
        - "Configuration hardening"
        - "Documentation security guidance"
        - "Test security practices"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the security concern
      placeholder: "Describe the issue..."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact Assessment
      description: What is the potential impact?
      placeholder: "The potential impact is..."
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: Recommended Fix
      description: How should this be fixed?
      placeholder: "This can be fixed by..."
    validations:
      required: true

  - type: dropdown
    id: cvss
    attributes:
      label: CVSS Score (if known)
      description: Estimated severity score
      options:
        - "Low (0.1-3.9)"
        - "Medium (4.0-6.9)"
        - "Unknown"
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to CVEs, security advisories, or relevant documentation
      placeholder: |
        - CVE-XXXX-XXXXX
        - https://...

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to help fix this?
      options:
        - label: I am willing to submit a PR to fix this issue
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information
      placeholder: "Add any other context..."
