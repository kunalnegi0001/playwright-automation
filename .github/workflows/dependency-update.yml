name: Dependency Management

on:
  schedule:
    # Run weekly on Monday at 6 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      update_type:
        description: "Update type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - all
        default: patch

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"

jobs:
  audit-dependencies:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_vulnerabilities: ${{ steps.audit.outputs.has_vulnerabilities }}
      vulnerability_count: ${{ steps.audit.outputs.vulnerability_count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        id: audit
        run: |
          set +e
          pnpm audit --json > audit-results.json
          audit_exit_code=$?
          set -e

          if [ $audit_exit_code -ne 0 ]; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
            vuln_count=$(cat audit-results.json | jq '.metadata.vulnerabilities | to_entries | map(.value) | add')
            echo "vulnerability_count=$vuln_count" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
            echo "vulnerability_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: audit-results.json
          retention-days: 30

  check-outdated:
    name: Check Outdated Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_updates: ${{ steps.outdated.outputs.has_updates }}
      update_count: ${{ steps.outdated.outputs.update_count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Check for outdated packages
        id: outdated
        run: |
          set +e
          pnpm outdated --json > outdated.json
          outdated_exit_code=$?
          set -e

          if [ $outdated_exit_code -ne 0 ] && [ -s outdated.json ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            update_count=$(cat outdated.json | jq 'length')
            echo "update_count=$update_count" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "update_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload outdated packages list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outdated-packages
          path: outdated.json
          retention-days: 30

  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    needs: [audit-dependencies, check-outdated]
    if: needs.check-outdated.outputs.has_updates == 'true' || needs.audit-dependencies.outputs.has_vulnerabilities == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update dependencies
        run: |
          update_type="${{ github.event.inputs.update_type || 'patch' }}"

          case $update_type in
            patch)
              pnpm update --latest --filter '!@playwright/*' --depth 0 --save-exact
              ;;
            minor)
              pnpm update --latest --filter '!@playwright/*' --depth 0
              ;;
            major)
              pnpm update --latest --depth 0
              ;;
            all)
              pnpm update --latest
              ;;
          esac

      - name: Update Playwright
        run: |
          pnpm update @playwright/test playwright --latest

      - name: Run tests after update
        run: |
          pnpm run typecheck
          pnpm run test:ui || echo "UI tests failed, updates may need review"
          pnpm run test:api || echo "API tests failed, updates may need review"

      - name: Create PR for updates
        id: create-pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update dependencies [${{ github.event.inputs.update_type || 'patch' }}]"
          title: "🔧 Dependency Updates - ${{ github.event.inputs.update_type || 'patch' }}"
          body: |
            ## 📦 Automated Dependency Update

            **Update Type:** ${{ github.event.inputs.update_type || 'patch' }}
            **Triggered by:** ${{ github.event_name }}
            **Security Vulnerabilities:** ${{ needs.audit-dependencies.outputs.vulnerability_count }}
            **Outdated Packages:** ${{ needs.check-outdated.outputs.update_count }}

            ### Changes
            This PR updates dependencies to their latest compatible versions.

            ### Verification
            - [ ] Type checks passed
            - [ ] Linting passed
            - [ ] Smoke tests completion status in workflow logs

            ### Security Audit
            - Vulnerabilities found: ${{ needs.audit-dependencies.outputs.vulnerability_count }}
            - See attached audit results for details

            ### Review Checklist
            - [ ] Review `package.json` changes
            - [ ] Review `pnpm-lock.yaml` changes
            - [ ] Check for breaking changes in updated packages
            - [ ] Verify all tests pass in CI
            - [ ] Review Playwright version compatibility

            ---
            *This PR was automatically created by the dependency update workflow*
          branch: dependency-updates/${{ github.run_number }}
          delete-branch: true
          labels: |
            dependencies
            automated
            ${{ needs.audit-dependencies.outputs.has_vulnerabilities == 'true' && 'security' || '' }}

      - name: Enable auto-merge for patch updates
        if: |
          steps.create-pr.outputs.pull-request-number &&
          (github.event.inputs.update_type == 'patch' || github.event.inputs.update_type == '') &&
          needs.audit-dependencies.outputs.has_vulnerabilities != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.create-pr.outputs.pull-request-number }},
              event: 'APPROVE',
              body: 'Auto-approving patch-level dependency updates with no security vulnerabilities.'
            });

